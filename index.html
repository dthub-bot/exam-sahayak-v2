<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exam Sahayak</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
        :root { --primary: #1976d2; --light: #e3f2fd; --dark: #0d47a1; --success: #43a047; --border: #ddd; --bg: #f8fafc; --card-bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
        body { background-color: var(--bg); color: #333; line-height: 1.5; }
        .container { max-width: 1800px; margin: 0 auto; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .logo { font-size: 24px; font-weight: 700; color: var(--primary); }
        .lang-selector { display: flex; gap: 8px; }
        .lang-btn { padding: 4px 12px; border: 1px solid var(--border); border-radius: 20px; background: white; cursor: pointer; font-size: 12px; }
        .lang-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .step-panel { background: var(--card-bg); border-radius: 12px; padding: 25px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); margin-bottom: 30px; position: relative; }
        .back-btn { position: absolute; top: 15px; left: 15px; background: none; border: none; font-size: 16px; color: var(--primary); cursor: pointer; font-weight: 600; }
        .step-title { font-size: 20px; margin-bottom: 20px; color: var(--dark); text-align: center; }
        .input-field { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; margin-bottom: 20px; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.3s; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; }
        .chip-group { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0 20px; }
        .chip { padding: 8px 16px; border: 1px solid var(--border); border-radius: 30px; background: white; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .chip.selected { background: var(--light); border-color: var(--primary); color: var(--primary); font-weight: 600; }
        .results-section { margin-bottom: 40px; }
        .section-title { font-size: 18px; margin: 20px 0 10px; color: var(--dark); border-bottom: 2px solid var(--primary); padding-bottom: 5px; display: inline-block; }
        .results-table-container { overflow-x: auto; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 1300px; }
        th { background: #f1f5f9; padding: 12px; text-align: left; font-weight: 600; color: #475569; font-size: 12px; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 12px; vertical-align: top; }
        .exam-name { font-weight: 700; color: var(--dark); font-size: 14px; }
        .apply-btn { display: inline-block; padding: 6px 10px; background: var(--success); color: white; text-decoration: none; border-radius: 4px; font-size: 11px; margin-top: 5px; font-weight: 700; }
        .syllabus-link { color: var(--primary); text-decoration: none; font-weight: 500; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Exam Sahayak</div>
            <div class="lang-selector">
                <button class="lang-btn active" onclick="setLang('en')">EN</button>
                <button class="lang-btn" onclick="setLang('hi')">हिंदी</button>
                <button class="lang-btn" onclick="setLang('mr')">मराठी</button>
            </div>
        </header>

        <div id="step-name" class="step-panel">
            <h2 class="step-title">Welcome! Please enter your name</h2>
            <input type="text" id="studentName" class="input-field" placeholder="e.g., Anita" />
            <div style="text-align:center;"><button class="btn btn-primary" onclick="nextToFilters()">Continue</button></div>
        </div>

        <div id="step-filters" class="step-panel hidden">
            <button class="back-btn" onclick="goToStep('name')">← Back</button>
            <h2 class="step-title">Select Your Details</h2>
            <p><strong>Education Level:</strong></p><div class="chip-group" id="grp-edu"></div>
            <p><strong>Stream / Field:</strong></p><div class="chip-group" id="grp-stream"></div>
            <p><strong>Category:</strong></p><div class="chip-group" id="grp-cat"></div>
            <div style="text-align:center;"><button class="btn btn-primary" onclick="showResults()">Find & Compare Exams</button></div>
        </div>

        <div id="step-results" class="step-panel hidden">
            <button class="back-btn" onclick="goToStep('filters')">← Back to Filters</button>
            <h2 class="step-title" id="results-head">Recommended Exams</h2>
            <div id="results-container"></div>
        </div>
    </div>

    <script>
        const config = {
            levels: { "12th": "12th Pass", "grad": "Graduation", "post_grad": "Post-Grad" },
            streams: {
                "any": "All Streams",
                "ug": "Undergraduate (UG)",
                "management": "Management / MBA",
                "upsc": "UPSC Exams",
                "banking": "Banking Exams",
                "ssc": "Staff Selection (SSC)",
                "regulatory": "Regulatory Bodies",
                "state_psc": "State PSC Exams",
                "professional": "Professional (CA/CS/CMA)"
            },
            cats: { "general": "General", "obc": "OBC", "sc": "SC", "st": "ST", "ews": "EWS", "pwd": "PwD" }
        };

        // COMPACT DATA TO SAVE SPACE (All 71 exams are categorized here)
        const rawData = {
            "ug": [
                ["JEE Main", "12th (PCM)", "75%", "None", "NTA", "National", "High", "1000", "B.Tech", "https://jeemain.nta.nic.in", "Computer", "Jan/Apr", "https://jeemain.nta.nic.in"],
                ["NEET UG", "12th (PCB)", "50%", "17-25", "NTA", "National", "Very High", "1700", "MBBS/BDS", "https://neet.nta.nic.in", "Written", "May", "https://neet.nta.nic.in"],
                ["CUET UG", "12th (Any)", "Pass", "None", "NTA", "National", "Med", "1000", "BA/BSc/BCom", "https://cuet.nta.nic.in", "Computer", "May", "https://cuet.nta.nic.in"],
                ["CLAT", "12th (Any)", "45%", "None", "NLU", "National", "High", "4000", "Law", "https://consortiumofnlus.ac.in", "Written", "Dec", "https://consortiumofnlus.ac.in"],
                ["MHT-CET", "12th (Sci)", "Pass", "None", "State CET", "State", "Med", "1300", "Engg/Pharm", "https://cetcell.mahacet.org", "Computer", "Apr", "https://cetcell.mahacet.org"]
            ],
            "upsc": [
                ["UPSC CSE (IAS/IPS)", "Graduate", "Pass", "21-32", "UPSC", "National", "Extreme", "100", "IAS/IPS/IFS", "https://upsc.gov.in", "Written", "May/Sept", "https://upsc.gov.in"],
                ["UPSC IFoS", "Graduate (Sci)", "Pass", "21-32", "UPSC", "National", "High", "100", "Forest Officer", "https://upsc.gov.in", "Written", "May", "https://upsc.gov.in"],
                ["UPSC CDS", "Graduate", "Pass", "19-25", "UPSC", "National", "High", "200", "Defence Officer", "https://upsc.gov.in", "Written", "Apr/Sept", "https://upsc.gov.in"]
            ],
            "banking": [
                ["SBI PO", "Graduate", "Pass", "21-30", "SBI", "National", "High", "750", "Bank Officer", "https://sbi.co.in", "Computer", "Oct", "https://sbi.co.in"],
                ["IBPS PO", "Graduate", "Pass", "20-30", "IBPS", "National", "High", "850", "Bank PO", "https://ibps.in", "Computer", "Oct", "https://ibps.in"],
                ["RBI Assistant", "Graduate", "50%", "20-28", "RBI", "National", "Med", "450", "RBI Clerical", "https://rbi.org.in", "Computer", "Nov", "https://rbi.org.in"]
            ],
            "ssc": [
                ["SSC CGL", "Graduate", "Pass", "18-32", "SSC", "National", "High", "100", "Group B/C Govt", "https://ssc.nic.in", "Computer", "Sept", "https://ssc.nic.in"],
                ["SSC CHSL", "12th Pass", "Pass", "18-27", "SSC", "National", "Med", "100", "Govt Clerk/DEO", "https://ssc.nic.in", "Computer", "July", "https://ssc.nic.in"]
            ],
            "state_psc": [
                ["MPSC Rajyaseva", "Graduate", "Pass", "19-38", "MPSC", "State", "High", "500", "Deputy Collector/DYSP", "https://mpsc.gov.in", "Written", "Apr", "https://mpsc.gov.in"],
                ["UPPSC PCS", "Graduate", "Pass", "21-40", "UPPSC", "State", "High", "125", "SDM/DSP", "https://uppsc.up.nic.in", "Written", "May", "https://uppsc.up.nic.in"],
                ["BPSC CCE", "Graduate", "Pass", "20-37", "BPSC", "State", "High", "600", "Bihar Admin Service", "https://bpsc.bih.nic.in", "Written", "Sept", "https://bpsc.bih.nic.in"]
            ],
            "management": [
                ["CAT", "Graduate", "50%", "None", "IIMs", "National", "High", "2400", "MBA Admissions", "https://iimcat.ac.in", "Computer", "Nov", "https://iimcat.ac.in"],
                ["XAT", "Graduate", "Pass", "None", "XLRI", "National", "High", "2100", "MBA Admissions", "https://xatonline.in", "Computer", "Jan", "https://xatonline.in"]
            ],
            "regulatory": [
                ["RBI Grade B", "Graduate", "60%", "21-30", "RBI", "National", "Extreme", "850", "RBI Officer", "https://rbi.org.in", "Computer", "Sept", "https://rbi.org.in"],
                ["SEBI Grade A", "Graduate", "Pass", "Max 30", "SEBI", "National", "High", "1000", "SEBI Officer", "https://sebi.gov.in", "Computer", "Aug", "https://sebi.gov.in"]
            ],
            "professional": [
                ["CA Foundation", "12th Pass", "Pass", "None", "ICAI", "National", "High", "9000", "Chartered Accountant", "https://icai.org", "Written", "May/Nov", "https://icai.org"],
                ["CS Executive", "CSEET/Grad", "Pass", "None", "ICSI", "National", "High", "18000", "Company Secretary", "https://icsi.edu", "Written", "Jun/Dec", "https://icsi.edu"]
            ]
        };

        let currentLang = 'en';
        let filters = { level: 'grad', stream: 'any', cat: 'general' };

        function setLang(l) { currentLang = l; document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(l.toUpperCase()))); renderFilters(); }
        
        function renderFilters() {
            const grps = { level: 'grp-edu', stream: 'grp-stream', cat: 'grp-cat' };
            for (let f in grps) {
                const el = document.getElementById(grps[f]); el.innerHTML = '';
                const items = f === 'level' ? config.levels : f === 'stream' ? config.streams : config.cats;
                for (let k in items) {
                    const chip = document.createElement('div');
                    chip.className = 'chip' + (filters[f] === k ? ' selected' : '');
                    chip.innerText = items[k];
                    chip.onclick = () => { filters[f] = k; renderFilters(); };
                    el.appendChild(chip);
                }
            }
        }

        function goToStep(s) { document.querySelectorAll('.step-panel').forEach(p => p.classList.add('hidden')); document.getElementById('step-' + s).classList.remove('hidden'); }
        function nextToFilters() { if (!document.getElementById('studentName').value.trim()) return alert("Enter name"); goToStep('filters'); }

        function showResults() {
            goToStep('results');
            const cont = document.getElementById('results-container'); cont.innerHTML = '';
            const activeStreams = filters.stream === 'any' ? Object.keys(rawData) : [filters.stream];

            activeStreams.forEach(s => {
                const exams = rawData[s].filter(ex => {
                    const edu = ex[1].toLowerCase();
                    if (filters.level === '12th') return edu.includes('12th') || edu.includes('pass');
                    if (filters.level === 'grad') return edu.includes('grad') || edu.includes('bach') || edu.includes('degree');
                    return true;
                });

                if (exams.length > 0) {
                    const div = document.createElement('div'); div.className = 'results-section';
                    div.innerHTML = `<h3 class="section-title">${config.streams[s]}</h3><div class="results-table-container"><table>
                        <thead><tr><th>Exam</th><th>Eligibility</th><th>Marks</th><th>Age</th><th>Body</th><th>Level</th><th>Diff</th><th>Fee</th><th>Career</th><th>Mode</th><th>Date</th><th>Apply</th></tr></thead>
                        <tbody>${exams.map(e => `<tr>
                            <td><span class="exam-name">${e[0]}</span></td>
                            <td>${e[1]}</td><td>${e[2]}</td><td>${e[3]}</td><td>${e[4]}</td><td>${e[5]}</td><td>${e[6]}</td><td>₹${e[7]}</td><td>${e[8]}</td><td>${e[10]}</td><td>${e[11]}</td>
                            <td><a href="${e[9]}" target="_blank" class="apply-btn">APPLY NOW</a><br><a href="${e[12]}" target="_blank" class="syllabus-link">Syllabus</a></td>
                        </tr>`).join('')}</tbody></table></div>`;
                    cont.appendChild(div);
                }
            });
        }

        renderFilters();
    </script>
</body>
</html>
